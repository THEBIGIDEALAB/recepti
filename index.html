<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepti</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, serif; background: #fff; color: #111; max-width: 640px; margin: 0 auto; padding: 0 16px; }
nav { position: sticky; top: 0; background: #fff; border-bottom: 2px solid #111; padding: 12px 0 8px; z-index: 100; }
nav h1 { font-size: 1.4rem; font-weight: bold; cursor: pointer; display: inline-block; }
#search-bar { margin-top: 8px; }
#search-input { width: 100%; border: 1.5px solid #111; padding: 7px 10px; font-size: 1rem; font-family: Georgia, serif; background: #fff; outline: none; }
#home-view { padding-top: 16px; }
.cat-item { border-bottom: 1px solid #ddd; padding: 16px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 1.05rem; font-weight: bold; }
.cat-item:active { background: #f5f5f5; }
.cat-count { font-size: 0.8rem; color: #888; font-weight: normal; margin-left: 6px; }
.cat-arrow { color: #999; }
#cat-view { display: none; padding-top: 16px; }
#search-view { display: none; padding-top: 16px; }
#search-results-title { font-size: 0.9rem; color: #666; margin-bottom: 12px; }
.back-btn { background: none; border: none; font-size: 0.95rem; font-family: Georgia, serif; cursor: pointer; padding: 0; margin-bottom: 16px; display: block; }
#cat-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 16px; border-bottom: 2px solid #111; padding-bottom: 8px; }
.recipe-card { border-bottom: 1px solid #ddd; padding: 14px 0; cursor: pointer; display: flex; gap: 14px; align-items: center; }
.recipe-card:active { background: #f5f5f5; }
.card-thumb { width: 70px; height: 70px; object-fit: cover; border: 1px solid #ddd; flex-shrink: 0; }
.card-ph { width: 70px; height: 70px; background: #eee; border: 1px solid #ddd; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
.card-info h2 { font-size: 1.05rem; font-weight: bold; line-height: 1.3; }
.card-info small { color: #666; font-size: 0.8rem; }
#no-results { padding: 40px 0; text-align: center; color: #888; display: none; }
#recipe-view { display: none; padding-top: 16px; padding-bottom: 60px; }
#recipe-view h1 { font-size: 1.6rem; line-height: 1.2; margin-bottom: 12px; }
.recipe-photo { width: 100%; display: block; margin-bottom: 16px; border: 1px solid #ddd; }
.recipe-notes { font-style: italic; color: #444; font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; padding: 12px 14px; border-left: 3px solid #111; background: #fafafa; }
.servings-bar { border: 1.5px solid #111; padding: 10px 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
.srv-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.srv-btn { width: 32px; height: 32px; border: 1.5px solid #111; background: #fff; font-size: 1.2rem; cursor: pointer; font-family: Georgia, serif; }
#srv-count { font-size: 1.1rem; font-weight: bold; min-width: 24px; text-align: center; }
.yt-wrap { position: relative; padding-bottom: 56.25%; margin-bottom: 20px; background: #000; }
.yt-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.sec { font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 2px solid #111; padding-bottom: 4px; margin-bottom: 12px; }
#ing-list { list-style: none; margin-bottom: 24px; }
#ing-list li { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 1rem; display: flex; gap: 8px; }
.ing-amt { font-weight: bold; min-width: 80px; flex-shrink: 0; }
.ing-group { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; color: #666; padding: 10px 0 2px; border-bottom: 1px solid #ccc; margin-bottom: 2px; list-style: none; display: block; }
#step-list { list-style: none; margin-bottom: 24px; }
#step-list li { padding: 12px 0; border-bottom: 1px solid #eee; font-size: 1rem; line-height: 1.6; display: flex; gap: 14px; }
.step-n { font-weight: bold; font-size: 1.2rem; min-width: 24px; flex-shrink: 0; }
.print-btn { border: 1.5px solid #111; background: #fff; padding: 10px 20px; font-family: Georgia, serif; font-size: 0.95rem; cursor: pointer; width: 100%; margin-top: 8px; }
#loading { text-align: center; padding: 60px 0; color: #888; }
  @media print {
    nav,.back-btn,.servings-bar,.print-btn,.yt-wrap{display:none!important;}
    #home-view,#cat-view,#search-view,#no-results,#loading{display:none!important;}
    @page{margin:1cm;size:A4 portrait;}
    body{max-width:100%;padding:0;margin:0;font-size:8pt;line-height:1.35;}
    #recipe-view{display:grid!important;padding:0;grid-template-columns:1fr 1fr 1fr;column-gap:12pt;row-gap:0;}
    #recipe-view>h1{grid-column:1/3;grid-row:1;font-size:14pt;margin:0 0 3pt 0;}
    #r-photo{grid-column:3;grid-row:1/3;display:block!important;width:100%;max-height:160pt;object-fit:cover;border-radius:3pt;align-self:start;}
    #r-notes{grid-column:1/3;grid-row:2;display:block!important;font-size:7.5pt;padding:3pt 5pt;margin:0 0 4pt 0;}
    #r-yt{display:none!important;}
    #recipe-view>p.sec:nth-of-type(1){grid-column:1;grid-row:3;font-size:8pt;font-weight:bold;margin:6pt 0 2pt 0;padding:0;border:none;}
    #recipe-view>p.sec:nth-of-type(2){grid-column:2/4;grid-row:3;font-size:8pt;font-weight:bold;margin:6pt 0 2pt 0;padding:0;border:none;}
    #ing-list{grid-column:1;grid-row:4;margin:0;padding-left:10pt;align-self:start;}
    #step-list{grid-column:2/4;grid-row:4;margin:0;padding-left:10pt;align-self:start;}
    #ing-list li,#step-list li{font-size:7.5pt;padding:1pt 0;line-height:1.3;}
    .group-header{font-size:7pt;font-weight:bold;text-transform:uppercase;letter-spacing:.04em;margin-top:5pt;list-style:none;padding:0;}
  }
</style>
</head>
<body>
<nav>
  <h1 id="logo">&#x1F374; Recepti</h1>
  <div id="search-bar"><input id="search-input" type="search" placeholder="Pretraži recepte..." autocomplete="off"></div>
</nav>
<div id="loading">Učitavam recepte...</div>
<div id="home-view" style="display:none"></div>
<div id="cat-view" style="display:none">
  <button class="back-btn" id="back-to-home">&#8592; Natrag</button>
  <div id="cat-title"></div>
</div>
<div id="search-view" style="display:none">
  <div id="search-results-title"></div>
</div>
<div id="no-results">Nema pronađenih recepata.</div>
<div id="recipe-view" style="display:none">
  <button class="back-btn" id="back-btn">&#8592; Natrag</button>
  <h1 id="r-title"></h1>
  <img id="r-photo" class="recipe-photo" style="display:none" alt="">
  <div id="r-notes" class="recipe-notes" style="display:none"></div>
  <div id="r-yt" class="yt-wrap" style="display:none"></div>
  <div class="servings-bar">
    <span>Osobe:</span>
    <div class="srv-controls">
      <button class="srv-btn" id="srv-minus">&#8722;</button>
      <span id="srv-count">4</span>
      <button class="srv-btn" id="srv-plus">+</button>
    </div>
  </div>
  <p class="sec">Sastojci</p>
  <ul id="ing-list"></ul>
  <p class="sec">Priprema</p>
  <ol id="step-list"></ol>
  <button class="print-btn" id="print-btn">&#9113; Ispisi recept (A4)</button>
</div>
<script>
(function() {
  var all = [], cur = null, curSrv = 4, baseSrv = 4;
  var view = 'home', prevView = 'home', curCat = null, _fromPop = false;
  var CAT_ORDER = ['Hrvatska','Hawaii','Japan','Kina','Portugal','Thailand','Vietnam','*Slatko i kolači'];

  function $(id) { return document.getElementById(id); }

  function hideAll() {
    ['home-view','cat-view','recipe-view','search-view','no-results'].forEach(function(id) {
      $(id).style.display = 'none';
    });
  }

  function fmt(a, r) {
    var v = a * r;
    return v === Math.round(v) ? '' + Math.round(v) : parseFloat(v.toFixed(2)).toString();
  }

  function boldName(name) {
    var idx = name.indexOf(',');
    if (idx === -1) return '<strong>' + name + '</strong>';
    return '<strong>' + name.substring(0, idx) + '</strong>' + name.substring(idx);
  }

  function renderHome() {
    if (!_fromPop) history.pushState({v:'home'}, '', location.pathname);
    hideAll(); view = 'home';
    var counts = {};
    all.forEach(function(r) { counts[r.category] = (counts[r.category] || 0) + 1; });
    $('home-view').innerHTML = CAT_ORDER.map(function(cat) {
      var n = counts[cat] || 0;
      return '<div class="cat-item" data-cat="' + cat + '"><span>' + cat +
        (n > 0 ? '<span class="cat-count">(' + n + ')</span>' : '') +
        '</span><span class="cat-arrow">&#8250;</span></div>';
    }).join('');
    $('home-view').style.display = 'block';
    $('search-input').value = '';
  }

  function renderCat(cat) {
    if (!_fromPop) history.pushState({v:'cat',cat:cat}, '', '#cat-' + cat);
    hideAll(); view = 'cat'; curCat = cat;
    var recipes = all.filter(function(r) { return r.category === cat; });
    recipes.sort(function(a, b) { return a.title.localeCompare(b.title, 'hr'); });
    $('cat-title').textContent = cat;
    var container = $('cat-view');
    container.querySelectorAll('.recipe-card,.cat-empty').forEach(function(el) { el.remove(); });
    if (recipes.length === 0) {
      var p = document.createElement('p');
      p.className = 'cat-empty';
      p.style.cssText = 'color:#888;padding:40px 0;text-align:center;';
      p.textContent = 'Nema recepata u ovoj kategoriji.';
      container.appendChild(p);
    } else {
      recipes.forEach(function(r) {
        var div = document.createElement('div');
        div.className = 'recipe-card'; div.dataset.id = r.id;
        div.innerHTML = (r.photo ? '<img class="card-thumb" src="' + r.photo + '" loading="lazy" alt="">' : '<div class="card-ph">&#x1F37D;</div>') +
          '<div class="card-info"><h2>' + r.title + '</h2><small>' + (r.servings || 4) + ' osobe</small></div>';
        container.appendChild(div);
      });
    }
    container.style.display = 'block';
  }

  function renderSearch(q) {
    hideAll(); view = 'search';
    var f = all.filter(function(r) {
      return r.title.toLowerCase().indexOf(q) >= 0 || (r.category || '').toLowerCase().indexOf(q) >= 0;
    }).sort(function(a, b) { return a.title.localeCompare(b.title, 'hr'); });
    $('search-results-title').textContent = 'Rezultati za "' + q + '": ' + f.length;
    var container = $('search-view');
    container.querySelectorAll('.recipe-card').forEach(function(el) { el.remove(); });
    if (f.length === 0) { $('no-results').style.display = 'block'; }
    f.forEach(function(r) {
      var div = document.createElement('div');
      div.className = 'recipe-card'; div.dataset.id = r.id;
      div.innerHTML = (r.photo ? '<img class="card-thumb" src="' + r.photo + '" loading="lazy" alt="">' : '<div class="card-ph">&#x1F37D;</div>') +
        '<div class="card-info"><h2>' + r.title + '</h2><small>' + (r.category || '') + ' &middot; ' + (r.servings || 4) + ' osobe</small></div>';
      container.appendChild(div);
    });
    container.style.display = 'block';
  }

  function renderIng() {
    var ratio = curSrv / baseSrv;
    $('ing-list').innerHTML = (cur.ingredients || []).map(function(i) {
      if (i.group) return '<li class="ing-group">' + i.group + '</li>';
      var amt = i.amount ? fmt(i.amount, ratio) + ' ' + (i.unit || '') : '';
      return '<li><span class="ing-amt">' + amt.trim() + '</span><span>' + boldName(i.name) + '</span></li>';
    }).join('');
  }

  function renderSteps() {
    $('step-list').innerHTML = (cur.steps || []).map(function(s, i) {
      return '<li><span class="step-n">' + (i + 1) + '.</span><span>' + s + '</span></li>';
    }).join('');
  }

  function openRecipe(recipe) {
    prevView = view; cur = recipe;
    baseSrv = recipe.servings || 4; curSrv = baseSrv;
    $('r-title').textContent = recipe.title;
    var ph = $('r-photo');
    if (recipe.photo) { ph.src = recipe.photo; ph.style.display = 'block'; } else { ph.style.display = 'none'; }
    var notes = $('r-notes');
    if (recipe.notes) { notes.innerHTML = recipe.notes; notes.style.display = 'block'; } else { notes.style.display = 'none'; }
    var yt = $('r-yt');
    if (recipe.youtube) { yt.style.display = 'block'; yt.innerHTML = '<iframe src="' + recipe.youtube + '" allowfullscreen loading="lazy"></iframe>'; }
    else { yt.style.display = 'none'; yt.innerHTML = ''; }
    $('srv-count').textContent = curSrv;
    renderIng(); renderSteps();
    hideAll(); $('recipe-view').style.display = 'block'; view = 'recipe';
    window.scrollTo(0, 0);
  }

  function loadRecipe(id) {
    fetch('recipes/' + id + '.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(recipe) { openRecipe(recipe); if (!_fromPop) history.pushState({v:'recipe',id:id}, '', '#' + id); })
      .catch(function() { alert('Ne mogu učitati recept.'); });
  }

  function goBack() {
    history.back();
  }

  $('logo').addEventListener('click', renderHome);
  $('back-to-home').addEventListener('click', function() { renderHome(); location.hash = ''; });
  $('back-btn').addEventListener('click', goBack);
  $('print-btn').addEventListener('click', function() { window.print(); });
  $('srv-minus').addEventListener('click', function() { curSrv = Math.max(1, curSrv - 1); $('srv-count').textContent = curSrv; renderIng(); });
  $('srv-plus').addEventListener('click', function() { curSrv++; $('srv-count').textContent = curSrv; renderIng(); });
  $('home-view').addEventListener('click', function(e) {
    var item = e.target.closest('.cat-item'); if (item) renderCat(item.dataset.cat);
  });
  $('cat-view').addEventListener('click', function(e) {
    var card = e.target.closest('.recipe-card'); if (card) loadRecipe(card.dataset.id);
  });
  $('search-view').addEventListener('click', function(e) {
    var card = e.target.closest('.recipe-card'); if (card) loadRecipe(card.dataset.id);
  });
  $('search-input').addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    if (!q) { renderHome(); return; }
    if (q.length >= 2) renderSearch(q);
  });

  fetch('recipes/index.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      all = d;
      $('loading').style.display = 'none';
      var h = location.hash.replace('#', '');
      if (h) loadRecipe(h); else renderHome();
    })
    .catch(function(e) { $('loading').textContent = 'Greška pri učitavanju.'; console.error(e); });
})();

  // popstate — browser back/forward & swipe
  window.addEventListener('popstate', function(e) {
    _fromPop = true;
    var st = e.state;
    if (!st || st.v === 'home') { renderHome(); }
    else if (st.v === 'cat') { renderCat(st.cat); }
    else if (st.v === 'recipe') { loadRecipe(st.id); }
    _fromPop = false;
  });

  // swipe left/right
  (function() {
    var tx = 0;
    document.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; }, {passive:true});
    document.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) < 60) return;
      if (dx < 0) history.forward();
      else history.back();
    }, {passive:true});
  })();

</script>
</body>
</html>
